<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крестики-нолики</title>
    <script src="/socket.io/socket.io.js" defer></script>
    <script src="/script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="lobby" class="lobby">
        <h1>Крестики-нолики</h1>
        <input type="text" id="roomInput" placeholder="Код комнаты">
        <button id="joinButton">Войти</button>
    </div>

    <div class="game" id="game" style="display: none;">
        <h1>Крестики-нолики</h1>
        <p id="roomInfo" class="room-info"></p>
        <p id="status" class="status">Ход: X</p>
        <p id="timer" class="timer"></p>
        <div id="board" class="board">
            <button class="cell" data-index="0"></button>
            <button class="cell" data-index="1"></button>
            <button class="cell" data-index="2"></button>
            <button class="cell" data-index="3"></button>
            <button class="cell" data-index="4"></button>
            <button class="cell" data-index="5"></button>
            <button class="cell" data-index="6"></button>
            <button class="cell" data-index="7"></button>
            <button class="cell" data-index="8"></button>
        </div>
        <button id="resetButton" class="reset-button">Новая игра</button>
    </div>

</body>
</html>
